name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ollama-chat:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/ollama-chat

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test
